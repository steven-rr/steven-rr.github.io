<!-- three ways to style elements:
	 1. directly target the element.
	 2. we can grab it by the class.
	 3. third, we can add an ID to it. 
 -->

<!DOCTYPE html>
<html>
	<head>
		<title>Da CSS Basics </title>
		<link rel="stylesheet" href="main.css">
	</head>
	<!-- How can we target the body tag directly, for example? Simple, just mention it in your css file. -->

	<body>		
		<h1>Skateboarding is Awesome</h1>
		<!-- Create div tag. now to add a class, we write the word class , equal sign, then we can name our class. We can name this whatever we want. In this case, we call it square.  -->
		<div class= "square"></div>
		<!-- Last method we can do to style an element is an ID. We create another div tag, and write ID. One thing to note about using ID's, ID's shuold be used sparingly. When using an ID, it needs to be very specific and unique. Shouldn't be using ID's all over the place, and avoid using iD's to style things. ID's allow us to interact with our HTML using javascript, and on top of that we can add style to them. -->
		<div id="circle"> Hey I'm a circle </div>
	</body>

</html>
