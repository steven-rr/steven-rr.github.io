	<div class = "formatting">
		<!-- we're going to add differnt formating for different types of text. 
			since we have display block on each of these divs, we will be able to 
			see each element a bit better. -->

		<!-- division allows us to divide the text into different parts, where we can apply
		different properties.   -->

		<!-- bolds the text -->
		<div><b> I am so BOLD </b></div>
		<!-- italizes text -->
		<div><i> I am leaning over..</i></div>
		<!-- emphasizes text, it is like italics but less so -->
		<div><em>I am so EMPHASIZED </em> </div>
		<!-- strong is bold, but less bold than bold. -->
		<div><strong> I am so strong</strong></div>
		<!-- Puts strikethrough through the text -->
		<div><del> Please don't delete me </del></div>
		<!-- Can put highlight through text -->
		<div><mark> Mark my words. </mark></div>

	</div>
	<!-- the "a" is called the anchor tag -->
	<a href="#"> Click Me Now </a>
